name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Collapse superseded runs per ref. Cancel-in-progress only for PRs: a fast
# series of pushes to a PR branch should drop stale runs (and the stale size
# comment they'd post). On main, build-and-tag commits the lighthouse baselines and
# force-pushes the `next` tag, so never interrupt it mid-flight.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version derives from the `packageManager` field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build framework packages first so apps/site tsc resolves their
      # published dist/ types (workspace exports point at dist).
      - name: Build framework packages
        run: pnpm --filter '@hono-preact/*' --filter hono-preact --filter hono-preact-ui build

      # The scaffolder ships a bundled docs corpus (templates/agents/llms-full.txt)
      # that is generated, not committed. Regenerate it before tests so the
      # corpus-presence gate and the scaffold copy test see a fresh file.
      - name: Generate bundled agents corpus
        run: pnpm gen:agents-corpus

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      # Type-level tests (`*.test-d.ts`): tsc enforces the type assertions
      # (typed-routes today) that the package `tsconfig`s exclude from typecheck.
      - name: Type tests
        run: pnpm test:types

      - name: Run tests with coverage
        shell: bash
        run: |
          set -o pipefail
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          pnpm test:coverage 2>&1 | tee -a $GITHUB_STEP_SUMMARY

      # Heavy dev-server/WebSocket integration tests, run isolated so they
      # neither flake under nor starve the parallel unit-test pool.
      - name: Integration tests (WebSocket in dev)
        run: pnpm test:integration

      - name: Build site
        run: pnpm --filter site build

  client-size:
    name: Framework JS size
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      # Version derives from the `packageManager` field in package.json.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build framework (PR head)
        run: pnpm --filter '@hono-preact/*' --filter hono-preact --filter hono-preact-ui build

      - name: Measure PR head
        run: node scripts/measure-framework-size.mjs --out /tmp/head.json

      # Build-both delta: measure the base ref in a worktree using THIS head's
      # measure script (so the base never needs to carry the script), then diff.
      # No committed baseline, so no metrics-commit merge conflicts.
      - name: Build framework (base ref) and measure
        env:
          BASE: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch --no-tags --depth=1 origin "$BASE"
          git worktree add /tmp/base "origin/$BASE"
          (cd /tmp/base && pnpm install --frozen-lockfile && pnpm --filter '@hono-preact/*' --filter hono-preact --filter hono-preact-ui build)
          node scripts/measure-framework-size.mjs \
            --iso-dist /tmp/base/packages/iso/dist \
            --ui-dist /tmp/base/packages/ui/dist \
            --out /tmp/base.json

      - name: Render comment
        env:
          SIZE_COMMENT_SHA: ${{ github.event.pull_request.head.sha }}
          SIZE_COMMENT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/render-framework-size-comment.mjs /tmp/head.json /tmp/base.json > /tmp/comment.md

      - name: Post sticky comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: framework-size
          path: /tmp/comment.md

  lighthouse:
    name: Lighthouse
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      # Version derives from the `packageManager` field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build framework packages
        run: pnpm --filter '@hono-preact/*' --filter hono-preact --filter hono-preact-ui build

      - name: Build site
        run: pnpm --filter site build

      # Serve the built SSR worker locally and run Lighthouse against it. The
      # health-check polls the HTTP endpoint (not wrangler's stdout wording).
      - name: Serve, collect, and upload
        run: |
          set -o pipefail
          (cd apps/site && pnpm exec wrangler dev -c dist/hono_preact/wrangler.json --local --port 8788) > wrangler.log 2>&1 &
          WRANGLER_PID=$!
          ready=
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:8788/; then ready=1; break; fi
            sleep 1
          done
          if [ -z "$ready" ]; then echo "wrangler did not become ready"; cat wrangler.log; kill $WRANGLER_PID || true; exit 1; fi
          pnpm exec lhci collect --config=.lighthouserc.json
          # temporary-public-storage: hosted report links (non-blocking on storage outage)
          pnpm exec lhci upload --config=.lighthouserc.json || true
          # filesystem: writes .lighthouseci/manifest.json that measure-lighthouse parses (required)
          pnpm exec lhci upload --config=.lighthouserc.json --upload.target=filesystem --upload.outputDir=.lighthouseci
          kill $WRANGLER_PID || true

      - name: Extract PR scores
        run: node scripts/measure-lighthouse.mjs --in .lighthouseci --out /tmp/fresh-lh.json

      - name: Render comment
        env:
          LH_COMMENT_SHA: ${{ github.event.pull_request.head.sha }}
          LH_COMMENT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/render-lighthouse-comment.mjs /tmp/fresh-lh.json lighthouse-report.json > /tmp/lh-comment.md

      - name: Post sticky comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: lighthouse
          path: /tmp/lh-comment.md

  preview:
    name: Preview deploy
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      # Version derives from the `packageManager` field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build framework packages first so the site build resolves their
      # published dist/ types and exports (workspace exports point at dist).
      - name: Build framework packages
        run: pnpm --filter '@hono-preact/*' --filter hono-preact --filter hono-preact-ui build

      - name: Build site
        run: pnpm --filter site build

      # Deploy the PR preview as an ACTIVE deployment of a DEDICATED preview
      # worker (hono-preact-preview), never the production hono-preact script.
      # Why a real `wrangler deploy` and not `wrangler versions upload`:
      #   * Cloudflare does NOT generate preview URLs for Workers that use
      #     Durable Objects, so the non-active-version + --preview-alias model
      #     produces no URL at all for this DO-bearing worker.
      #   * A real deploy serves the worker at its stable *.workers.dev URL and
      #     applies the DO migration itself (versions upload cannot), so the
      #     preview worker needs no manual seeding.
      # The production custom_domain route is stripped first, so the preview can
      # never claim framework.sbesh.com; with no route the deploy needs only the
      # account-level Workers Scripts permission the token already has, and the
      # live site is untouched. NOTE: this is a single shared preview worker, so
      # concurrent PRs share the one URL (last push wins).
      - name: Deploy preview
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          worker="hono-preact-preview"
          # Strip the production custom_domain route so the preview worker cannot
          # claim framework.sbesh.com. Write the copy alongside the generated
          # config so wrangler still resolves main/assets relative to that dir.
          jq 'del(.routes)' apps/site/dist/hono_preact/wrangler.json \
            > apps/site/dist/hono_preact/wrangler.preview.json
          pnpm --filter site exec wrangler deploy -c dist/hono_preact/wrangler.preview.json --name "$worker" 2>&1 | tee /tmp/preview-deploy.log
          url="$(grep -ioE "https://${worker}\.[a-z0-9-]+\.workers\.dev" /tmp/preview-deploy.log | head -1)"
          if [ -z "$url" ]; then
            echo "Could not find the *.workers.dev URL in wrangler output" >&2
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Post preview comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-docs
          message: |
            ### Docs site preview

            A non-production preview of this PR, deployed to a dedicated preview worker (not the live `framework.sbesh.com` site):

            ${{ steps.deploy.outputs.url }}

            Built from ${{ github.event.pull_request.head.sha }}. Updates on every push.

  build-and-tag:
    name: Build and tag next
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Version derives from the `packageManager` field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages and app
        run: pnpm build

      - name: Measure Lighthouse baseline
        # Soft: a wrangler/Chrome/LHCI hiccup must not block the `next` tag
        # move below. The PR `lighthouse` job is the canary for genuine
        # Lighthouse breakage.
        continue-on-error: true
        run: |
          set -o pipefail
          (cd apps/site && pnpm exec wrangler dev -c dist/hono_preact/wrangler.json --local --port 8788) > wrangler.log 2>&1 &
          WRANGLER_PID=$!
          ready=
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:8788/; then ready=1; break; fi
            sleep 1
          done
          if [ -z "$ready" ]; then echo "wrangler did not become ready"; cat wrangler.log; kill $WRANGLER_PID || true; exit 1; fi
          pnpm exec lhci collect --config=.lighthouserc.json
          pnpm exec lhci upload --config=.lighthouserc.json || true
          pnpm exec lhci upload --config=.lighthouserc.json --upload.target=filesystem --upload.outputDir=.lighthouseci
          kill $WRANGLER_PID || true
          node scripts/measure-lighthouse.mjs --in .lighthouseci --append-history --badge \
            --sha "$GITHUB_SHA" --date "$(git show -s --format=%cI "$GITHUB_SHA")"

      - name: Commit baselines
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if ! git diff --quiet lighthouse-report.json lighthouse-history.jsonl lighthouse-badge.json; then
            git add lighthouse-report.json lighthouse-history.jsonl lighthouse-badge.json
            git commit -m "chore(metrics): update lighthouse baselines [skip ci]"
            git push origin HEAD:main
          fi

      - name: Move next tag to HEAD
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # Anchor to the triggering commit, not local HEAD: the 'Commit baselines'
          # step above may have advanced HEAD with a bookkeeping commit.
          git tag -f next "$GITHUB_SHA"
          git push origin next --force
