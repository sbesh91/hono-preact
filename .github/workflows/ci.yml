name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Collapse superseded runs per ref. Cancel-in-progress only for PRs: a fast
# series of pushes to a PR branch should drop stale runs (and the stale size
# comment they'd post). On main, build-and-tag commits the size baseline and
# force-pushes the `next` tag, so never interrupt it mid-flight.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          # Pinned: pnpm 11 hit a workspace peer-dep override propagation bug
          # against the preact-iso v3 GitHub override. Keep aligned with the
          # `packageManager` field in package.json.
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build framework packages first so apps/site tsc resolves their
      # published dist/ types (workspace exports point at dist).
      - name: Build framework packages
        run: pnpm --filter '@hono-preact/*' --filter hono-preact --filter hono-preact-ui build

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests with coverage
        shell: bash
        run: |
          set -o pipefail
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          pnpm test:coverage 2>&1 | tee -a $GITHUB_STEP_SUMMARY

      # Heavy dev-server/WebSocket integration tests, run isolated so they
      # neither flake under nor starve the parallel unit-test pool.
      - name: Integration tests (WebSocket in dev)
        run: pnpm test:integration

      - name: Build site
        run: pnpm --filter site build

  client-size:
    name: Client JS size
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build framework packages
        run: pnpm --filter '@hono-preact/*' --filter hono-preact --filter hono-preact-ui build

      - name: Build site
        run: pnpm --filter site build

      - name: Measure PR head
        run: node scripts/measure-client-size.mjs --out /tmp/fresh-size.json

      - name: Render comment
        env:
          # Pins the comment to the commit it measured, so a re-measured sticky
          # comment is distinguishable from the original at-open one.
          SIZE_COMMENT_SHA: ${{ github.event.pull_request.head.sha }}
          SIZE_COMMENT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/render-size-comment.mjs /tmp/fresh-size.json client-size-report.json > /tmp/size-comment.md

      - name: Post sticky comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: client-size
          path: /tmp/size-comment.md

  lighthouse:
    name: Lighthouse
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build framework packages
        run: pnpm --filter '@hono-preact/*' --filter hono-preact --filter hono-preact-ui build

      - name: Build site
        run: pnpm --filter site build

      # Serve the built SSR worker locally and run Lighthouse against it. The
      # health-check polls the HTTP endpoint (not wrangler's stdout wording).
      - name: Serve, collect, and upload
        run: |
          set -o pipefail
          (cd apps/site && pnpm exec wrangler dev -c dist/hono_preact/wrangler.json --local --port 8788) > wrangler.log 2>&1 &
          WRANGLER_PID=$!
          ready=
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:8788/; then ready=1; break; fi
            sleep 1
          done
          if [ -z "$ready" ]; then echo "wrangler did not become ready"; cat wrangler.log; kill $WRANGLER_PID || true; exit 1; fi
          pnpm exec lhci collect --config=.lighthouserc.json
          # temporary-public-storage: hosted report links (non-blocking on storage outage)
          pnpm exec lhci upload --config=.lighthouserc.json || true
          # filesystem: writes .lighthouseci/manifest.json that measure-lighthouse parses (required)
          pnpm exec lhci upload --config=.lighthouserc.json --upload.target=filesystem --upload.outputDir=.lighthouseci
          kill $WRANGLER_PID || true

      - name: Extract PR scores
        run: node scripts/measure-lighthouse.mjs --in .lighthouseci --out /tmp/fresh-lh.json

      - name: Render comment
        env:
          LH_COMMENT_SHA: ${{ github.event.pull_request.head.sha }}
          LH_COMMENT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/render-lighthouse-comment.mjs /tmp/fresh-lh.json lighthouse-report.json > /tmp/lh-comment.md

      - name: Post sticky comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: lighthouse
          path: /tmp/lh-comment.md

  build-and-tag:
    name: Build and tag next
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          # Pinned: pnpm 11 hit a workspace peer-dep override propagation bug
          # against the preact-iso v3 GitHub override. Keep aligned with the
          # `packageManager` field in package.json.
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages and app
        run: pnpm build

      - name: Measure client size baseline
        run: |
          node scripts/measure-client-size.mjs \
            --append-history \
            --sha "$GITHUB_SHA" \
            --date "$(git show -s --format=%cI "$GITHUB_SHA")"

      - name: Measure Lighthouse baseline
        run: |
          set -o pipefail
          (cd apps/site && pnpm exec wrangler dev -c dist/hono_preact/wrangler.json --local --port 8788) > wrangler.log 2>&1 &
          WRANGLER_PID=$!
          ready=
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:8788/; then ready=1; break; fi
            sleep 1
          done
          if [ -z "$ready" ]; then echo "wrangler did not become ready"; cat wrangler.log; kill $WRANGLER_PID || true; exit 1; fi
          pnpm exec lhci collect --config=.lighthouserc.json
          pnpm exec lhci upload --config=.lighthouserc.json || true
          pnpm exec lhci upload --config=.lighthouserc.json --upload.target=filesystem --upload.outputDir=.lighthouseci
          kill $WRANGLER_PID || true
          node scripts/measure-lighthouse.mjs --in .lighthouseci --append-history --badge \
            --sha "$GITHUB_SHA" --date "$(git show -s --format=%cI "$GITHUB_SHA")"

      - name: Commit baselines
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if ! git diff --quiet client-size-report.json client-size-history.jsonl lighthouse-report.json lighthouse-history.jsonl lighthouse-badge.json; then
            git add client-size-report.json client-size-history.jsonl lighthouse-report.json lighthouse-history.jsonl lighthouse-badge.json
            git commit -m "chore(metrics): update size + lighthouse baselines [skip ci]"
            git push origin HEAD:main
          fi

      - name: Move next tag to HEAD
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # Anchor to the triggering commit, not local HEAD: the size step above
          # may have advanced HEAD with a bookkeeping commit.
          git tag -f next "$GITHUB_SHA"
          git push origin next --force
