name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Collapse superseded runs per ref. Cancel-in-progress only for PRs: a fast
# series of pushes to a PR branch should drop stale runs (and the stale size
# comment they'd post). On main, build-and-tag pushes the lighthouse baselines to
# the `metrics` branch and force-pushes the `next` tag, so never interrupt it mid-flight.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version derives from the `packageManager` field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build framework packages first so apps/site tsc resolves their
      # published dist/ types (workspace exports point at dist).
      - name: Build framework packages
        run: pnpm --filter '@hono-preact/*' --filter hono-preact --filter hono-preact-ui build

      # The scaffolder ships a bundled docs corpus (templates/agents/llms-full.txt)
      # that is generated, not committed. Regenerate it before tests so the
      # corpus-presence gate and the scaffold copy test see a fresh file.
      - name: Generate bundled agents corpus
        run: pnpm gen:agents-corpus

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      # Type-level tests (`*.test-d.ts`): tsc enforces the type assertions
      # (typed-routes today) that the package `tsconfig`s exclude from typecheck.
      - name: Type tests
        run: pnpm test:types

      - name: Run tests with coverage
        shell: bash
        run: |
          set -o pipefail
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          pnpm test:coverage 2>&1 | tee -a $GITHUB_STEP_SUMMARY

      # Heavy dev-server/WebSocket integration tests, run isolated so they
      # neither flake under nor starve the parallel unit-test pool.
      - name: Integration tests (WebSocket in dev)
        run: pnpm test:integration

      - name: Build site
        run: pnpm --filter site build

  # End-to-end smoke for the scaffolder's OWN install + git-init path
  # (create-hono-preact -> runChild -> spawn). The unit suite stubs spawn, and
  # scaffold-integration installs deps itself with --no-install, so neither
  # exercises the real spawn. This job does, on every supported OS.
  #
  # Windows is the reason it exists (issue #256): npm/pnpm are `.cmd` shims that
  # spawn cannot launch without a shell, so a scaffold+install fails with ENOENT
  # unless the shell:true fix is present. Linux runs the identical script so the
  # coverage is equal, not Windows-only.
  #
  # The install resolves against a LOCAL registry holding this commit's own
  # packages, not the public one (see the smoke step for why). That is what lets
  # the job cover the framework under review, and what lets a release PR (whose
  # template pin names a not-yet-published version) run at all.
  scaffold-smoke:
    name: Scaffold smoke (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Version derives from the `packageManager` field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm pack` (in the smoke step) runs prepack, NOT prepublishOnly, and
      # these packages carry their build only on prepublishOnly. So dist has to
      # be built here or the packed tarball ships an empty one. This is also the
      # step that makes the smoke cover THIS commit's framework rather than
      # whatever is on the public registry.
      - name: Build framework packages
        run: pnpm --filter '@hono-preact/*' --filter hono-preact --filter hono-preact-ui build

      # The scaffold copies templates/agents/llms-full.txt, which is generated.
      - name: Generate bundled agents corpus
        run: pnpm gen:agents-corpus

      # The scaffolded app's `npm install` has to resolve the template's
      # `hono-preact` pin. Resolving it from the PUBLIC registry is wrong twice
      # over: it installs whatever was last published rather than THIS commit's
      # framework (so the smoke never covered the code under review), and a
      # release PR bumps that pin to a version that does not exist yet (the
      # lockstep policy in CLAUDE.md requires the bump in the same commit as the
      # version bump), which cannot install at all. So: run a local registry,
      # publish the workspace's own packages into it, and point npm there.
      # Everything else proxies through to npmjs via the uplink.
      #
      # Start + publish + scaffold live in ONE step deliberately: the registry
      # is a background process, and keeping it inside a single step means it is
      # guaranteed alive for the commands that need it and is torn down with the
      # step, on both runners, with no cross-step process-survival assumptions.
      #
      # The scaffold script itself is identical across OSes (bash is available
      # on the Windows runner via Git for Windows). Force the npm branch of the
      # pm detector so the smoke runs the exact `npm install` from the issue
      # everywhere, then assert both spawned steps actually happened
      # (node_modules + .git).
      - name: Scaffold a node app against a local registry, letting the CLI install and git-init
        shell: bash
        env:
          npm_config_registry: http://localhost:4873
          npm_config_user_agent: 'npm/10 node/v22 ${{ runner.os }} x64'
        run: |
          echo "::group::Start local registry"
          # Pinned exactly, like the wrangler pins in the preview workflows: a
          # floating range would refetch a different registry on some future run
          # and turn this job into a supply-chain surface plus a flake source.
          npx --yes verdaccio@6.8.0 --config "$GITHUB_WORKSPACE/.github/verdaccio.yaml" &
          # Poll rather than pull in a wait-for-it dependency; curl is on both
          # runners. Quiet in the loop (a connect refusal per second is just
          # noise), loud on the final check.
          for _ in $(seq 1 90); do
            curl -fs -o /dev/null http://localhost:4873/ && break
            sleep 1
          done
          curl -fsS -o /dev/null http://localhost:4873/ || {
            echo 'FAIL: local registry did not come up'
            exit 1
          }
          # verdaccio's `publish: $all` permits anonymous publishing, but the npm
          # CLI refuses to even try without a token, so hand it a throwaway. The
          # registry never validates it. Written to the USER npmrc: the repo's
          # own .npmrc is tracked (and empty), so a project-location write would
          # dirty the tree.
          npm config set //localhost:4873/:_authToken "ci-smoke" --location user
          echo "::endgroup::"

          echo "::group::Publish the workspace framework into it"
          # Pack, then `npm publish <tarball>`, deliberately NOT `pnpm publish`.
          # pnpm publish first asks "is this version already published?" and that
          # check does not honor --registry: it queries the PUBLIC registry, sees
          # the released version, prints "There are no new packages that should
          # be published", and exits 0. That silently publishes nothing and
          # leaves the scaffold to fail later with a confusing ETARGET.
          # `npm publish <tarball>` has no such skip logic: it publishes the
          # exact bytes or fails loudly.
          #
          # Packing does not run prepublishOnly, so the dist built by the build
          # step above is what gets packed. That is the same artifact the real
          # release publishes (its prepublishOnly is that same build).
          rm -rf "$RUNNER_TEMP/tgz" && mkdir -p "$RUNNER_TEMP/tgz"
          pnpm --filter hono-preact pack --pack-destination "$RUNNER_TEMP/tgz"
          pnpm --filter hono-preact-ui pack --pack-destination "$RUNNER_TEMP/tgz"
          for tgz in "$RUNNER_TEMP"/tgz/*.tgz; do
            npm publish "$tgz" --registry http://localhost:4873
          done
          echo "::endgroup::"

          echo "::group::Scaffold"
          cd "$RUNNER_TEMP"
          node "$GITHUB_WORKSPACE/packages/create-hono-preact/bin/index.mjs" smoke-app --adapter=node
          echo "::endgroup::"

          test -d smoke-app/node_modules || { echo 'FAIL: npm install did not run (spawn ENOENT?)'; exit 1; }
          test -d smoke-app/.git || { echo 'FAIL: git init did not run'; exit 1; }

          # Prove the framework came from the local registry, i.e. that the
          # smoke actually exercised this commit's build. Without this, a
          # misconfigured registry would silently fall back to the public one
          # and quietly restore the very gap this job exists to close.
          grep -q '"resolved": "http://localhost:4873/hono-preact/-/' smoke-app/package-lock.json || {
            echo 'FAIL: hono-preact did not resolve from the local registry'
            grep -A1 '"node_modules/hono-preact"' smoke-app/package-lock.json || true
            exit 1
          }

  client-size:
    name: Framework JS size
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      # Version derives from the `packageManager` field in package.json.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build framework (PR head)
        run: pnpm --filter '@hono-preact/*' --filter hono-preact --filter hono-preact-ui build

      - name: Measure PR head
        run: node scripts/measure-framework-size.mjs --out /tmp/head.json

      # Real-build baseline: the always-loaded client JS the docs site actually
      # ships on every route (what the isolated probe above cannot show).
      - name: Build docs site (PR head) and measure baseline
        run: |
          pnpm --filter site build
          node scripts/measure-site-chunks.mjs --out /tmp/head-site.json

      # Build-both delta: measure the base ref in a worktree using THIS head's
      # measure scripts (so the base never needs to carry them), then diff.
      # No committed baseline, so no metrics-commit merge conflicts.
      - name: Build framework + site (base ref) and measure
        env:
          BASE: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch --no-tags --depth=1 origin "$BASE"
          git worktree add /tmp/base "origin/$BASE"
          (cd /tmp/base && pnpm install --frozen-lockfile && pnpm --filter '@hono-preact/*' --filter hono-preact --filter hono-preact-ui build && pnpm --filter site build)
          node scripts/measure-framework-size.mjs \
            --iso-dist /tmp/base/packages/iso/dist \
            --ui-dist /tmp/base/packages/ui/dist \
            --out /tmp/base.json
          node scripts/measure-site-chunks.mjs \
            --static-dir /tmp/base/apps/site/dist/client/static \
            --out /tmp/base-site.json

      - name: Render comment
        env:
          SIZE_COMMENT_SHA: ${{ github.event.pull_request.head.sha }}
          SIZE_COMMENT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/render-framework-size-comment.mjs /tmp/head.json /tmp/base.json /tmp/head-site.json /tmp/base-site.json > /tmp/comment.md

      - name: Post sticky comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: framework-size
          path: /tmp/comment.md

  lighthouse:
    name: Lighthouse
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      # Version derives from the `packageManager` field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build framework packages
        run: pnpm --filter '@hono-preact/*' --filter hono-preact --filter hono-preact-ui build

      - name: Build site
        run: pnpm --filter site build

      # Serve the built SSR worker locally and run Lighthouse against it. The
      # health-check polls the HTTP endpoint (not wrangler's stdout wording).
      - name: Serve, collect, and upload
        run: |
          set -o pipefail
          (cd apps/site && pnpm exec wrangler dev -c dist/hono_preact/wrangler.json --local --port 8788) > wrangler.log 2>&1 &
          WRANGLER_PID=$!
          ready=
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:8788/; then ready=1; break; fi
            sleep 1
          done
          if [ -z "$ready" ]; then echo "wrangler did not become ready"; cat wrangler.log; kill $WRANGLER_PID || true; exit 1; fi
          pnpm exec lhci collect --config=.lighthouserc.json
          # temporary-public-storage: hosted report links (non-blocking on storage outage)
          pnpm exec lhci upload --config=.lighthouserc.json || true
          # filesystem: writes .lighthouseci/manifest.json that measure-lighthouse parses (required)
          pnpm exec lhci upload --config=.lighthouserc.json --upload.target=filesystem --upload.outputDir=.lighthouseci
          kill $WRANGLER_PID || true

      - name: Extract PR scores
        run: node scripts/measure-lighthouse.mjs --in .lighthouseci --out /tmp/fresh-lh.json

      - name: Render comment
        env:
          LH_COMMENT_SHA: ${{ github.event.pull_request.head.sha }}
          LH_COMMENT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Read the baseline off the `metrics` branch. Use FETCH_HEAD, not
          # origin/metrics: a bare `git fetch <branch>` does not reliably update the
          # remote-tracking ref, but FETCH_HEAD always points at what was just fetched.
          # Fall back to an empty baseline when the branch or file is absent (first run);
          # the renderer tolerates {} via `baseline.pages ?? {}`.
          git fetch origin metrics --depth=1 2>/dev/null \
            && git show FETCH_HEAD:lighthouse-report.json > /tmp/baseline.json \
            || echo '{}' > /tmp/baseline.json
          node scripts/render-lighthouse-comment.mjs /tmp/fresh-lh.json /tmp/baseline.json > /tmp/lh-comment.md

      - name: Post sticky comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: lighthouse
          path: /tmp/lh-comment.md

  preview:
    name: Preview deploy
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      # Version derives from the `packageManager` field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build framework packages first so the site build resolves their
      # published dist/ types and exports (workspace exports point at dist).
      - name: Build framework packages
        run: pnpm --filter '@hono-preact/*' --filter hono-preact --filter hono-preact-ui build

      - name: Build site
        run: pnpm --filter site build

      # Deploy the PR preview as an ACTIVE deployment of a DEDICATED per-PR
      # preview worker (hono-preact-preview-pr-<N>), never the production
      # hono-preact script.
      # Why a real `wrangler deploy` and not `wrangler versions upload`:
      #   * Cloudflare does NOT generate preview URLs for Workers that use
      #     Durable Objects, so the non-active-version + --preview-alias model
      #     produces no URL at all for this DO-bearing worker.
      #   * A real deploy serves the worker at its stable *.workers.dev URL and
      #     applies the DO migration itself (versions upload cannot), so the
      #     preview worker needs no manual seeding.
      # The production custom_domain route is stripped first, so the preview can
      # never claim framework.sbesh.com; with no route the deploy needs only the
      # account-level Workers Scripts permission the token already has, and the
      # live site is untouched. Each PR gets its OWN worker keyed by PR number, so
      # concurrent PRs no longer collide; preview-cleanup.yml deletes the worker
      # when the PR closes.
      - name: Deploy preview
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          worker="hono-preact-preview-pr-${{ github.event.pull_request.number }}"
          # Strip the production custom_domain route so the preview worker cannot
          # claim framework.sbesh.com. Write the copy alongside the generated
          # config so wrangler still resolves main/assets relative to that dir.
          jq 'del(.routes)' apps/site/dist/hono_preact/wrangler.json \
            > apps/site/dist/hono_preact/wrangler.preview.json
          pnpm --filter site exec wrangler deploy -c dist/hono_preact/wrangler.preview.json --name "$worker" 2>&1 | tee /tmp/preview-deploy.log
          url="$(grep -ioE "https://${worker}\.[a-z0-9-]+\.workers\.dev" /tmp/preview-deploy.log | head -1)"
          if [ -z "$url" ]; then
            echo "Could not find the *.workers.dev URL in wrangler output" >&2
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Post preview comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-docs
          message: |
            ### Docs site preview

            A non-production preview of this PR, deployed to a dedicated per-PR preview worker (not the live `framework.sbesh.com` site):

            ${{ steps.deploy.outputs.url }}

            Built from ${{ github.event.pull_request.head.sha }}. Updates on every push; removed when this PR closes.

  build-and-tag:
    name: Build and tag next
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Version derives from the `packageManager` field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages and app
        run: pnpm build

      - name: Prepare metrics worktree
        # Failure-tolerant: a missing metrics branch must not block the `next` tag
        # move below. Always sets METRICS_WT so the measure step has a target.
        run: |
          set +e
          # Detached worktree at the fetched metrics tip. The later push (HEAD:metrics)
          # is a fast-forward because the parent is that tip; main runs are serialized
          # by the concurrency group (cancel-in-progress: false), so no push race.
          git fetch origin metrics --depth=1 2>/dev/null && git worktree add metrics-wt FETCH_HEAD
          if [ -e metrics-wt/.git ]; then
            echo "metrics worktree ready"
          else
            echo "::warning::metrics branch unavailable; lighthouse baselines will not persist this run (run the one-time bootstrap)."
            mkdir -p metrics-wt
          fi
          echo "METRICS_WT=$PWD/metrics-wt" >> "$GITHUB_ENV"

      - name: Measure Lighthouse baseline
        # Soft: a wrangler/Chrome/LHCI hiccup must not block the `next` tag
        # move below. The PR `lighthouse` job is the canary for genuine
        # Lighthouse breakage.
        continue-on-error: true
        run: |
          set -o pipefail
          (cd apps/site && pnpm exec wrangler dev -c dist/hono_preact/wrangler.json --local --port 8788) > wrangler.log 2>&1 &
          WRANGLER_PID=$!
          ready=
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:8788/; then ready=1; break; fi
            sleep 1
          done
          if [ -z "$ready" ]; then echo "wrangler did not become ready"; cat wrangler.log; kill $WRANGLER_PID || true; exit 1; fi
          pnpm exec lhci collect --config=.lighthouserc.json
          pnpm exec lhci upload --config=.lighthouserc.json || true
          pnpm exec lhci upload --config=.lighthouserc.json --upload.target=filesystem --upload.outputDir=.lighthouseci
          kill $WRANGLER_PID || true
          node scripts/measure-lighthouse.mjs --in .lighthouseci --append-history --badge \
            --out-dir "$METRICS_WT" \
            --sha "$GITHUB_SHA" --date "$(git show -s --format=%cI "$GITHUB_SHA")"

      - name: Push metrics
        # The worktree (when present) is the `metrics` branch checkout; commit and
        # push there. Skips cleanly when the branch was unavailable (plain dir, no
        # .git gitlink). main HEAD is never touched.
        run: |
          if [ ! -e metrics-wt/.git ]; then
            echo "no metrics worktree; skipping push"
            exit 0
          fi
          git -C metrics-wt config user.email "github-actions[bot]@users.noreply.github.com"
          git -C metrics-wt config user.name "github-actions[bot]"
          git -C metrics-wt add lighthouse-report.json lighthouse-history.jsonl lighthouse-badge.json
          if ! git -C metrics-wt diff --cached --quiet; then
            git -C metrics-wt commit -m "chore(metrics): update lighthouse baselines"
            git -C metrics-wt push origin HEAD:metrics
          fi

      - name: Move next tag to HEAD
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # Anchor to the triggering commit defensively. Baselines now push to the
          # `metrics` branch, so main HEAD no longer advances during this job.
          git tag -f next "$GITHUB_SHA"
          git push origin next --force
