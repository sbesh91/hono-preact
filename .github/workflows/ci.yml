name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          # Pinned: pnpm 11 hit a workspace peer-dep override propagation bug
          # against the preact-iso v3 GitHub override. Keep aligned with the
          # `packageManager` field in package.json.
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build framework packages first so apps/site tsc resolves their
      # published dist/ types (workspace exports point at dist).
      - name: Build framework packages
        run: pnpm --filter '@hono-preact/*' --filter hono-preact build

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests with coverage
        shell: bash
        run: |
          set -o pipefail
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          pnpm test:coverage 2>&1 | tee -a $GITHUB_STEP_SUMMARY

      # Heavy dev-server/WebSocket integration tests, run isolated so they
      # neither flake under nor starve the parallel unit-test pool.
      - name: Integration tests (WebSocket in dev)
        run: pnpm test:integration

      - name: Build site
        run: pnpm --filter site build

  client-size:
    name: Client JS size
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build framework packages
        run: pnpm --filter '@hono-preact/*' --filter hono-preact build

      - name: Build site
        run: pnpm --filter site build

      - name: Measure PR head
        run: node scripts/measure-client-size.mjs --out /tmp/fresh-size.json

      - name: Render comment
        run: node scripts/render-size-comment.mjs /tmp/fresh-size.json client-size-report.json > /tmp/size-comment.md

      - name: Post sticky comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: client-size
          path: /tmp/size-comment.md

  build-and-tag:
    name: Build and tag next
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          # Pinned: pnpm 11 hit a workspace peer-dep override propagation bug
          # against the preact-iso v3 GitHub override. Keep aligned with the
          # `packageManager` field in package.json.
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages and app
        run: pnpm build

      - name: Update client size baseline + history
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          node scripts/measure-client-size.mjs \
            --append-history \
            --sha "$GITHUB_SHA" \
            --date "$(git show -s --format=%cI "$GITHUB_SHA")"
          if ! git diff --quiet client-size-report.json client-size-history.jsonl; then
            git add client-size-report.json client-size-history.jsonl
            git commit -m "chore(size): update client size baseline + history [skip ci]"
            git push origin HEAD:main
          fi

      - name: Move next tag to HEAD
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # Anchor to the triggering commit, not local HEAD: the size step above
          # may have advanced HEAD with a bookkeeping commit.
          git tag -f next "$GITHUB_SHA"
          git push origin next --force
